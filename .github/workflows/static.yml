name: Deploy Static Content to Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Disable Jekyll
        run: touch public/.nojekyll

      - name: Generate directory listings
        run: |
          find public -type d | while read -r dir; do
            rel="${dir#public}"
            [ -z "$rel" ] && rel="/"
            index="$dir/index.html"

            cat > "$index" <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <title>Conformance Resources — $rel</title>
          <style>
            body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
            h1 { font-size: 1.3rem; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
            .breadcrumb { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
            .breadcrumb a { color: #0366d6; text-decoration: none; }
            ul { list-style: none; padding: 0; }
            li { padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
            a { color: #0366d6; text-decoration: none; }
            a:hover { text-decoration: underline; }
            .dir::before { content: "📁 "; }
            .file::before { content: "📄 "; }
            .up::before { content: "⬅ "; }
          </style>
          </head>
          <body>
          <div class="breadcrumb">artifacts $rel</div>
          <h1>Índice: $rel</h1>
          <ul>
          EOF

            if [ "$rel" != "/" ]; then
              echo '<li class="up"><a href="../">.. (subir)</a></li>' >> "$index"
            fi

            # Carpetas primero, orden version-aware (v2 antes que v10)
            find "$dir" -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | sort -V | while read -r name; do
              echo "<li class=\"dir\"><a href=\"$name/\">$name/</a></li>" >> "$index"
            done

            # Archivos después, mismo criterio de orden
            find "$dir" -maxdepth 1 -mindepth 1 -type f -printf '%f\n' | sort -V | while read -r name; do
              [ "$name" = "index.html" ] && continue
              echo "<li class=\"file\"><a href=\"$name\">$name</a></li>" >> "$index"
            done

            echo "</ul></body></html>" >> "$index"
          done
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "public"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
